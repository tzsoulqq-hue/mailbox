syntax = "proto3";

package mailboxregister;

option go_package = "./;pb";

message RunMailboxRegistrationRequest {
  bool enabled = 1;
  bool import_only = 2;
}

message RunMailboxRegistrationResponse {
  bool success = 1;
  int32 exit_code = 2;
  string error_message = 3;
  repeated MailboxRegistrationAccount accounts = 4;
}

message MailboxRegistrationAccount {
  string email_address = 1;
  string password = 2;
  string refresh_token = 3;
  string access_token = 4;
  string source = 5;
}

message RunMailboxOAuthRequest {
  string email_address = 1;
  bool only_missing = 2;
  int32 limit = 3;
  repeated MailboxRegistrationAccount accounts = 4;
}

message MailboxOAuthResult {
  string email_address = 1;
  bool success = 2;
  string error_message = 3;
  string refresh_token = 4;
  string access_token = 5;
}

message RunMailboxOAuthResponse {
  bool success = 1;
  int32 processed = 2;
  int32 succeeded = 3;
  int32 failed = 4;
  string error_message = 5;
  repeated MailboxOAuthResult results = 6;
}
