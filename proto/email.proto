syntax = "proto3";

package email;

option go_package = "./;pb";

message EmailMailbox {
  string email_address = 1;
  string password = 2;
  string refresh_token = 3;
  string access_token = 4;
  reserved 5, 6;
  reserved "status";
  string last_error = 7;
  reserved 8, 9;
  reserved "is_primary", "primary_email";
  int64 created_at = 10;
  int64 updated_at = 11;
  reserved 12, 13, 14, 16, 17;
  reserved "latest_otp", "latest_otp_subject", "latest_otp_received_at_unix",
    "latest_otp_provider", "latest_otp_source_mailbox_email";
  string auth_status = 15;
  string provider = 18;
  EmailSignal latest_signal = 19;
  string domain = 20;
}

enum EmailSignalKind {
  EMAIL_SIGNAL_KIND_UNSPECIFIED = 0;
  EMAIL_SIGNAL_KIND_OTP = 1;
  reserved 2, 3;
}

message EmailSignal {
  EmailSignalKind kind = 1;
  string code = 2;
  string label = 3;
  string profile = 4;
  string parser = 5;
  int32 confidence = 6;
  string evidence = 7;
}

message MarkEmailAuthStatusRequest {
  string email_address = 1;
  string auth_status = 2;
  string last_error = 3;
}

message MarkEmailAuthStatusResponse {
  EmailMailbox mailbox = 1;
}

message UpsertEmailMailboxRequest {
  EmailMailbox mailbox = 1;
}

message UpsertEmailMailboxResponse {
  EmailMailbox mailbox = 1;
}

message ListEmailMailboxesRequest {
  reserved 1;
  reserved "status";
  int32 limit = 2;
  string auth_status = 3;
  string provider = 4;
}

message ListEmailMailboxesResponse {
  repeated EmailMailbox mailboxes = 1;
}

message DeleteMailboxRequest {
  string email_address = 1;
}

message DeleteMailboxResponse {
  bool deleted = 1;
}

message WaitForEmailRequest {
  string email_address = 1;
  string subject_keyword = 2;
  int32 timeout_seconds = 3;
  int64 issued_after_unix = 4;
  string parser_profile = 5;
  EmailSignalKind signal_kind = 6;
}

message WaitForEmailResponse {
  bool found = 1;
  EmailInboxMessage message = 2;
}

message EmailInboxMessage {
  string id = 1;
  string mailbox_email = 2;
  string subject = 3;
  string from_address = 4;
  string body_preview = 5;
  int64 received_at_unix = 6;
  repeated string recipients = 7;
  reserved 8, 11;
  reserved "otp", "event_type";
  string provider = 9;
  string source_mailbox_email = 10;
  string body_text = 12;
  string html_body = 13;
  int64 raw_size = 14;
  repeated EmailSignal signals = 15;
  EmailSignal primary_signal = 16;
}

message InboundEmailWebhook {
  int32 version = 1;
  string provider = 2;
  string event_id = 3;
  string message_id = 4;
  string from_address = 5;
  repeated string recipients = 6;
  string subject = 7;
  string text_body = 8;
  string html_body = 9;
  int64 received_at_unix = 10;
  int64 raw_size = 11;
  reserved 12, 13;
  reserved "extracted_otp", "event_type";
}

message FetchInboxesRequest {
  int32 limit_per_mailbox = 1;
  int32 max_mailboxes = 2;
  string email_address = 3;
  string parser_profile = 4;
  int64 received_after_unix = 5;
}

message FetchMailboxInboxResult {
  EmailMailbox mailbox = 1;
  repeated EmailInboxMessage messages = 2;
  string error_message = 3;
}

message FetchInboxesResponse {
  repeated FetchMailboxInboxResult results = 1;
  int32 mailbox_count = 2;
  int32 fetched_count = 3;
  int32 failed_count = 4;
  int32 message_count = 5;
}

service EmailService {
  rpc MarkEmailAuthStatus(MarkEmailAuthStatusRequest) returns (MarkEmailAuthStatusResponse);
  rpc UpsertMailbox(UpsertEmailMailboxRequest) returns (UpsertEmailMailboxResponse);
  rpc ListMailboxes(ListEmailMailboxesRequest) returns (ListEmailMailboxesResponse);
  rpc DeleteMailbox(DeleteMailboxRequest) returns (DeleteMailboxResponse);
  rpc WaitForEmail(WaitForEmailRequest) returns (WaitForEmailResponse);
  rpc FetchInboxes(FetchInboxesRequest) returns (FetchInboxesResponse);
}
