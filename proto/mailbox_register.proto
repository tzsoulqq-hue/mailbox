syntax = "proto3";

package mailboxregister;

option go_package = "./;pb";

message RunMailboxRegistrationRequest {
  bool enabled = 1;
  bool import_only = 2;
  int32 max_count = 3;
}

message RunMailboxRegistrationResponse {
  bool success = 1;
  int32 exit_code = 2;
  string error_message = 3;
  repeated MailboxRegistrationAccount accounts = 4;
}

message MailboxRegistrationAccount {
  string email_address = 1;
  string password = 2;
  string refresh_token = 3;
  string access_token = 4;
  string source = 5;
  string home_country = 6;
  string home_ip = 7;
  string proxy_profile = 8;
  bool manual_recovery_required = 9;
  string last_error = 10;
}

message RunMailboxOAuthRequest {
  string email_address = 1;
  bool only_missing = 2;
  int32 limit = 3;
  repeated MailboxRegistrationAccount accounts = 4;
}

message MailboxOAuthResult {
  string email_address = 1;
  bool success = 2;
  string error_message = 3;
  string refresh_token = 4;
  string access_token = 5;
}

message RunMailboxOAuthResponse {
  bool success = 1;
  int32 processed = 2;
  int32 succeeded = 3;
  int32 failed = 4;
  string error_message = 5;
  repeated MailboxOAuthResult results = 6;
}

message SelectMailboxOAuthAccountsRequest {
  string operation_id = 1;
  string email_address = 2;
  bool only_missing = 3;
  int32 limit = 4;
}

message SelectMailboxOAuthAccountsResponse {
  repeated MailboxRegistrationAccount accounts = 1;
}

message RunMailboxOAuthAccountRequest {
  string operation_id = 1;
  MailboxRegistrationAccount account = 2;
}

message RunMailboxOAuthAccountResponse {
  MailboxOAuthResult result = 1;
}

message CompleteMailboxOAuthRequest {
  string operation_id = 1;
  repeated MailboxRegistrationAccount accounts = 2;
  repeated MailboxOAuthResult results = 3;
}
